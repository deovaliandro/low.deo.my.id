{{ define "main" }}
  <article class="max-w-4xl mx-auto">
  <header class="mb-2 mt-4">
    <h1 class="text-5xl">
      {{ .Title }}
    </h1>

    <time datetime="{{ .Date.Format " 2006-01-02" }}" class="mt-3 text-sm font-mono">
      {{ .Date.Format "02 Jan 2006" }}
    </time>
  </header>
  <section class="text-xl leading-relaxed">
    {{ .Content }}
  </section>
</article>
{{ end }}
