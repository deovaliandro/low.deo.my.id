baseURL: 'https://example.org/'
locale: 'en-us'
title: 'My New Hugo Project'
params:
  author:
    name: 'Deo Valiandro. M'
    email: 'deo@duck.com'

build:
  buildStats:
    enable: true
  cachebusters:
  - source: 'assets/notwatching/hugo_stats\.json'
    target: css
  - source: '(postcss|tailwind)\.config\.js'
    target: css
module:
  mounts:
  - source: assets
    target: assets
  - disableWatch: true
    source: hugo_stats.json
    target: assets/notwatching/hugo_stats.json

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    tabWidth: 4
    lineNos: false